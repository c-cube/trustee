name: build
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  run:
    name: build  # build+test on various versions of OCaml, on linux
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        container:
          - ghcr.io/c-cube/c-cube-commmon/ci-5.0:latest
          - ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules:
          recursive
    - run: opam pin -n .
    - run: apt update && opam update && opam install -t . --deps-only
    - run: opam exec -- dune build -p trustee,trustee-opentheory
    - run: opam exec -- dune runtest -p trustee,trustee-opentheory
